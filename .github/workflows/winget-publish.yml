name: Publish to Winget

# 暂时禁用工作流，等下次再开启
on:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check and install winget
        run: |
          # 检查 winget 是否已安装
          if (-not (Get-Command winget -ErrorAction SilentlyContinue)) {
            Write-Host "Winget not found, installing..."
            # 安装 Winget CLI
            Invoke-WebRequest -Uri https://aka.ms/getwinget -OutFile getwinget.msi
            Start-Process msiexec.exe -ArgumentList '/i getwinget.msi /quiet' -Wait
            Remove-Item getwinget.msi
            Write-Host "Winget installed successfully"
          } else {
            Write-Host "Winget is already installed"
          }

      - name: Get release information
        id: release_info
        uses: actions/github-script@v7
        with:
          script: |
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: context.ref.replace('refs/tags/', '')
            });
            const asset = release.data.assets.find(asset => asset.name.includes('windows-x86_64.zip'));
            if (!asset) {
              throw new Error('Windows x86_64 zip asset not found');
            }
            return {
              version: release.data.tag_name.replace('v', ''),
              downloadUrl: asset.browser_download_url
            };

      - name: Install wingetcreate
        run: |
          # 安装 wingetcreate
          winget install Microsoft.WingetCreate --source winget

      - name: Update winget package
        run: |
          $version = "${{ steps.release_info.outputs.result.version }}"
          $url = "${{ steps.release_info.outputs.result.downloadUrl }}"
          
          # 使用 wingetcreate 命令更新包
          wingetcreate update SunJary.NetAssistant --version $version --urls $url --submit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}